name: Publish To NPM

on:
  push:
    branches:
      - master
  workflow_dispatch:
    inputs:
      publish:
        description: 'Publish to npm (false = validation only)'
        required: false
        default: false
        type: boolean

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    outputs:
      package_name: ${{ steps.package_meta.outputs.name }}
      package_version: ${{ steps.package_meta.outputs.version }}
      should_publish: ${{ steps.npm_check.outputs.should_publish }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install Dependencies
        run: npm ci

      - name: Read Package Metadata
        id: package_meta
        shell: bash
        run: |
          package_name="$(node -p "require('./package.json').name")"
          package_version="$(node -p "require('./package.json').version")"
          echo "name=$package_name" >> "$GITHUB_OUTPUT"
          echo "version=$package_version" >> "$GITHUB_OUTPUT"

      - name: Check npm For Existing Version
        id: npm_check
        shell: bash
        run: |
          package_name="${{ steps.package_meta.outputs.name }}"
          package_version="${{ steps.package_meta.outputs.version }}"

          if npm view "$package_name@$package_version" version > /dev/null 2>&1; then
            echo "Package $package_name@$package_version is already published."
            echo "should_publish=false" >> "$GITHUB_OUTPUT"
          else
            echo "Package $package_name@$package_version is not published yet."
            echo "should_publish=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Run Release Checks
        run: npm run release:check

  publish:
    needs: verify
    runs-on: ubuntu-latest
    if: needs.verify.outputs.should_publish == 'true' && (github.event_name == 'push' || inputs.publish == true)
    permissions:
      contents: write
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js For npm Publish
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          registry-url: 'https://registry.npmjs.org'

      - name: Install Dependencies
        run: npm ci

      - name: Build Package
        run: npm run clean && npm run build

      - name: Log Publish Target
        run: echo "Publishing ${{ needs.verify.outputs.package_name }}@${{ needs.verify.outputs.package_version }} to npm"

      - name: Publish To npm
        run: npm publish --access public --provenance

      - name: Generate Release Notes
        id: release_notes
        shell: bash
        run: |
          latest_tag="$(git tag --list 'v*' --sort=-version:refname | head -n 1 || true)"
          commit_range="HEAD"
          if [ -n "$latest_tag" ]; then
            commit_range="${latest_tag}..HEAD"
          fi

          npx tsx scripts/generate-release-notes.ts "${{ needs.verify.outputs.package_version }}" "$commit_range" > release-notes.md
          echo "release_tag=v${{ needs.verify.outputs.package_version }}" >> "$GITHUB_OUTPUT"

      - name: Create Git Tag
        shell: bash
        run: |
          release_tag="${{ steps.release_notes.outputs.release_tag }}"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          if git ls-remote --exit-code --tags origin "refs/tags/$release_tag" > /dev/null 2>&1; then
            echo "Tag $release_tag already exists on origin. Skipping tag creation."
            exit 0
          fi

          git tag -a "$release_tag" -m "Release $release_tag"
          git push origin "$release_tag"

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.release_notes.outputs.release_tag }}
          name: ${{ steps.release_notes.outputs.release_tag }}
          body_path: release-notes.md
